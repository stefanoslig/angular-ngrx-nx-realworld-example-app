<div class="card">
  <div class="card-block">
    <p class="card-text">{{ comment().body }}</p>
  </div>
  <div class="card-footer">
    <a class="comment-author" [routerLink]="['/profile', comment().author.username]">
      <cdt-avatar [src]="comment().author.image" [username]="comment().author.username" size="sm" />
    </a>
    &nbsp;
    <a class="comment-author" [routerLink]="['/profile', comment().author.username]">
      {{ comment().author.username }}
    </a>
    <span class="date-posted">
      {{ comment().createdAt | date: 'longDate' }}
    </span>
    <span class="mod-options" [hidden]="currentUser().username !== comment().author.username">
      <cdt-icon [name]="Icon.Trash2" (click)="delete.emit({ commentId: comment().id, slug: article().slug })" />
    </span>
  </div>
</div>

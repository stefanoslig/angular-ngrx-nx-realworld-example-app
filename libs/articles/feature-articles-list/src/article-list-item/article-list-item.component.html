<div class="article-preview">
  <div class="article-meta">
    <a [routerLink]="['/profile', article().author.username]">
      <cdt-avatar [src]="article().author.image" [username]="article().author.username" size="md" />
    </a>
    <div class="info">
      <span class="date">
        {{ article().createdAt | date: 'longDate' }}
      </span>
    </div>
    <button
      [ngClass]="{
        'btn-outline-primary': article().favorited,
        'btn-primary': article().favorited
      }"
      class="btn btn-sm pull-xs-right"
      (click)="toggleFavorite(article())"
    >
      <cdt-icon [name]="Icon.Heart" />
      {{ article().favoritesCount }}
    </button>
  </div>
  <a (click)="navigateToArticle.emit(article().slug)" class="preview-link">
    <h1 data-testid="article-list-title">{{ article().title }}</h1>
    <p>{{ article().description }}</p>
    <span>Read more...</span>
    <ul class="tag-list">
      @for (tag of article().tagList; track tag) {
        <li class="tag-default tag-pill tag-outline">
          {{ tag }}
        </li>
      }
    </ul>
  </a>
</div>
